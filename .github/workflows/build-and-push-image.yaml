name: Build and Push Storefront Image to ECR

on:
  push:
    branches: [main]
    paths-ignore:
      - "deploy/**"
      - ".github/**"
      - "claude/**"
      - ".devcontainer/**"
      - ".gitignore"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

permissions:
  contents: write
  id-token: write

concurrency:
  group: build-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    uses: deco-sites/deploy-deco-apps/.github/workflows/build_and_setup.yaml@1.0.0
    with:
      aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
    secrets:
      ECR_CI_AWS_ACCESS_KEY_ID: ${{ secrets.ECR_CI_AWS_ACCESS_KEY_ID }}
      ECR_CI_AWS_SECRET_ACCESS_KEY: ${{ secrets.ECR_CI_AWS_SECRET_ACCESS_KEY }}
      ECR_REPOSITORY_POLICY_JSON: ${{ secrets.ECR_REPOSITORY_POLICY_JSON || '{}' }}
